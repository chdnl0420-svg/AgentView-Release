name: Hide old releases (draft)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  hide:
    runs-on: ubuntu-latest
    steps:
      - name: Convert all OTHER releases to drafts (invisible to non-collaborators)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Keeping public: $KEEP_TAG"

          # For every release except the one just published, PATCH draft=true.
          # Drafts disappear from the public /releases listing and from the
          # `/releases/latest` endpoint, but the underlying git tag stays.
          # Collaborators can still see them on the repo's Releases page.
          gh api -X GET "repos/$REPO/releases" --paginate \
            --jq ".[] | select(.tag_name != \"$KEEP_TAG\" and .draft == false) | .id" \
            | while read -r rid; do
                [ -z "$rid" ] && continue
                echo "Drafting release id=$rid"
                gh api -X PATCH "repos/$REPO/releases/$rid" -f draft=true >/dev/null
              done

          echo "Done. Public release: $KEEP_TAG. All others are now drafts."
